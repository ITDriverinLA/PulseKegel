<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Analytics — PulseKegel</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy-deep: #080A20;
    --navy: #0B0E26;
    --navy-soft: #15183A;
    --teal: #36E7B3;
    --teal-dim: rgba(54, 231, 179, 0.18);
    --white: #F6F7FB;
    --gray: #A8ACC4;
    --gray-dim: #6B6F88;
    --line: rgba(255, 255, 255, 0.08);
    --line-strong: rgba(255, 255, 255, 0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }
  body {
    background: var(--navy-deep);
    color: var(--white);
    font-family: 'Poppins', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  ::selection { background: var(--teal); color: var(--navy-deep); }

  /* ---- NAV ---- */
  nav {
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 18px 40px;
    background: rgba(8, 10, 32, 0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .wordmark {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.01em;
    color: var(--white);
    text-decoration: none;
  }
  .wordmark .dot {
    width: 7px; height: 7px;
    background: var(--teal);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--teal);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.45; transform: scale(0.85); }
    50%       { opacity: 1;   transform: scale(1.1);  }
  }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .nav-ts {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gray-dim);
  }
  .btn-refresh {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--navy-deep);
    background: var(--teal);
    border: none;
    border-radius: 3px;
    padding: 8px 16px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
  }
  .btn-refresh:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-refresh:active { transform: translateY(0); }

  /* ---- LAYOUT ---- */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 40px 80px;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--teal);
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line-strong);
  }

  /* ---- STAT CARDS ---- */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 56px;
  }
  @media (max-width: 700px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .stat-card {
    position: relative;
    background: var(--navy);
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    padding: 28px 24px 24px;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--teal), transparent);
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gray-dim);
    margin-bottom: 14px;
  }
  .stat-value {
    font-size: 40px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--white);
  }
  .stat-value.loading { color: var(--gray-dim); font-size: 28px; }
  .stat-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gray-dim);
    margin-top: 8px;
    letter-spacing: 0.12em;
  }

  /* ---- CHART ---- */
  .chart-section { margin-bottom: 56px; }
  .chart-wrap {
    background: var(--navy);
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    padding: 28px 24px 20px;
  }
  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 140px;
    margin-bottom: 12px;
  }
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
    gap: 4px;
  }
  .bar {
    width: 100%;
    background: var(--teal-dim);
    border-radius: 2px 2px 0 0;
    transition: background 0.15s;
    cursor: default;
    position: relative;
  }
  .bar.has-data { background: var(--teal); }
  .bar:hover { opacity: 0.75; }
  .bar[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--navy-deep);
    background: var(--teal);
    border-radius: 2px;
    padding: 3px 7px;
    pointer-events: none;
    z-index: 5;
  }
  .bar-zero { width: 100%; height: 2px; background: var(--line-strong); border-radius: 2px; }
  .chart-x {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--gray-dim);
    margin-top: 4px;
    padding: 0 2px;
  }
  .chart-legend {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gray-dim);
    letter-spacing: 0.12em;
  }
  .legend-item { display: flex; align-items: center; gap: 7px; }
  .legend-swatch { width: 12px; height: 4px; border-radius: 2px; }

  /* ---- EVENTS TABLE ---- */
  .events-section { margin-bottom: 0; }
  .events-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .events-table thead tr {
    border-bottom: 1px solid var(--line-strong);
  }
  .events-table th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--gray-dim);
    padding: 0 0 14px;
    text-align: left;
  }
  .events-table th:last-child { text-align: right; }
  .events-table td {
    padding: 14px 0;
    border-bottom: 1px dashed var(--line);
    color: var(--white);
    vertical-align: middle;
  }
  .events-table tr:last-child td { border-bottom: none; }
  .events-table td:last-child {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--teal);
  }
  .event-type-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    background: var(--navy-soft);
    border: 1px solid var(--line-strong);
    border-radius: 3px;
    padding: 3px 10px;
    color: var(--gray);
  }

  /* ---- ERROR STATE ---- */
  .error-state {
    text-align: center;
    padding: 60px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--gray-dim);
    text-transform: uppercase;
  }
  .error-state strong { display: block; color: #ff6b6b; margin-bottom: 8px; font-size: 14px; }
</style>
</head>
<body>

<nav>
  <a class="wordmark" href="/"><span class="dot"></span>PulseKegel</a>
  <div class="nav-right">
    <span class="nav-ts" id="ts">—</span>
    <button class="btn-refresh" onclick="load()">Refresh</button>
  </div>
</nav>

<main>

  <!-- Stat cards -->
  <div class="section-label">Overview</div>
  <div class="stat-grid" id="stat-grid">
    <div class="stat-card"><div class="stat-label">Total Devices</div><div class="stat-value loading" id="s-total">—</div></div>
    <div class="stat-card"><div class="stat-label">DAU (24 h)</div><div class="stat-value loading" id="s-dau">—</div></div>
    <div class="stat-card"><div class="stat-label">WAU (7 d)</div><div class="stat-value loading" id="s-wau">—</div></div>
    <div class="stat-card"><div class="stat-label">MAU (30 d)</div><div class="stat-value loading" id="s-mau">—</div></div>
  </div>

  <!-- 30-day chart -->
  <div class="chart-section">
    <div class="section-label">Unique Devices — Last 30 Days</div>
    <div class="chart-wrap">
      <div class="chart-bars" id="chart-bars">
        <!-- rendered by JS -->
      </div>
      <div class="chart-x" id="chart-x"></div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-swatch" style="background:var(--teal)"></div>Active day</div>
        <div class="legend-item"><div class="legend-swatch" style="background:var(--teal-dim)"></div>No activity</div>
      </div>
    </div>
  </div>

  <!-- Event type table -->
  <div class="events-section">
    <div class="section-label">Events by Type</div>
    <table class="events-table">
      <thead><tr><th>Event</th><th>All-time count</th></tr></thead>
      <tbody id="events-body"></tbody>
    </table>
  </div>

</main>

<script>
  // Escape all untrusted strings before inserting into innerHTML.
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  async function load() {
    document.getElementById('ts').textContent = '—';
    try {
      const r = await fetch('/api/analytics/summary');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();

      // Timestamp
      document.getElementById('ts').textContent =
        'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      // Stat cards
      setValue('s-total', d.totalDevices ?? 0);
      setValue('s-dau',   d.dau ?? 0);
      setValue('s-wau',   d.wau ?? 0);
      setValue('s-mau',   d.mau ?? 0);

      // Chart
      renderChart(d.dailyUniqueUsers || []);

      // Events table
      renderEvents(d.eventsByType || []);

    } catch (err) {
      const errDiv = document.createElement('div');
      errDiv.className = 'error-state';
      const strong = document.createElement('strong');
      strong.textContent = 'Failed to load';
      const msg = document.createTextNode(String(err.message));
      errDiv.appendChild(strong);
      errDiv.appendChild(msg);
      document.querySelector('main').prepend(errDiv);
    }
  }

  function setValue(id, val) {
    const el = document.getElementById(id);
    el.textContent = val;
    el.classList.remove('loading');
  }

  function renderChart(days) {
    const bars = document.getElementById('chart-bars');
    const xAxis = document.getElementById('chart-x');
    if (!days.length) {
      bars.textContent = 'No data';
      return;
    }

    const max = Math.max(...days.map(d => d.count), 1);

    // Build with safe numeric/date values only — no user-controlled strings go into HTML.
    bars.innerHTML = days.map(d => {
      const count  = Number(d.count) || 0;
      // date is always YYYY-MM-DD from the server (safe, but we escape anyway)
      const date   = esc(String(d.date ?? ''));
      const tip    = date + ': ' + count + (count === 1 ? ' device' : ' devices');
      const pct    = count > 0 ? Math.max((count / max) * 100, 4) : 0;
      const cls    = count > 0 ? 'bar has-data' : 'bar';
      const height = count > 0 ? pct + '%' : '2px';
      return `<div class="bar-col"><div class="${cls}" style="height:${height}" data-tip="${tip}"></div></div>`;
    }).join('');

    // X-axis labels — date strings from server, escaped
    const first = esc((days[0]?.date ?? '').slice(5));
    const mid   = esc((days[Math.floor(days.length / 2)]?.date ?? '').slice(5));
    const last  = esc((days[days.length - 1]?.date ?? '').slice(5));
    xAxis.innerHTML = `<span>${first}</span><span>${mid}</span><span>${last}</span>`;
  }

  function renderEvents(events) {
    const tbody = document.getElementById('events-body');
    if (!events.length) {
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.colSpan = 2;
      td.style.cssText = 'color:var(--gray-dim);padding:20px 0';
      td.textContent = 'No events recorded yet';
      tr.appendChild(td);
      tbody.innerHTML = '';
      tbody.appendChild(tr);
      return;
    }
    // eventType comes from client-submitted analytics — must be escaped.
    tbody.innerHTML = events.map(e =>
      `<tr>
        <td><span class="event-type-badge">${esc(e.eventType)}</span></td>
        <td>${Number(e.count).toLocaleString()}</td>
      </tr>`
    ).join('');
  }

  load();
</script>
</body>
</html>
