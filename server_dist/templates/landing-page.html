    padding: 8px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 30px 80px rgba(0,0,0,0.55),
      inset 0 0 0 1px rgba(255,255,255,0.04);
  }
  .phone-notch {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 22px;
    background: #05071B;
    border-radius: 14px;
    z-index: 3;
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(54, 231, 179, 0.08) 0%, transparent 60%),
      var(--navy);
    border-radius: 36px;
    padding: 54px 22px 24px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .phone-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 14px;
    margin-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .phone-header .app-title {
    font-family: 'General Sans', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--white);
  }
  .phone-header .session {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.24em;
    color: var(--gray-dim);
    text-transform: uppercase;
  }
  .phone-gauge-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--teal);
    text-transform: uppercase;
    text-align: center;
    opacity: 0.9;
    margin-bottom: 12px;
  }
  .phone-gauge-row {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }
  .phone-bar-frame {
    background:
      linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
      var(--navy-deep);
    border: 1px solid rgba(54, 231, 179, 0.22);
    border-radius: 4px;
    padding: 8px 6px;
  }
  .phone-scale {
    display: flex;
    flex-direction: column-reverse;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--gray-dim);
    padding: 6px 0;
  }
  .phone-state {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 10px 12px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    margin-top: 14px;
    color: var(--gray);
  }
  .phone-state .phase { color: var(--teal); transition: color 0.3s; }
  .phone-state .phase.hold { color: var(--peak-amber); }
  .phone-state .phase.release { color: var(--teal-dim); }
  .phone-state .phase.rest { color: var(--gray-dim); }
  .phone-pill {
    background: var(--teal);
    color: var(--navy-deep);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    padding: 12px;
    border-radius: 999px;
    text-align: center;
    margin-top: 14px;
  }

  /* ---------- SECTION 2: COPY ---------- */
  .instrument-copy { max-width: 520px; }
  .instrument-copy p {
    font-family: 'Poppins', sans-serif;
    font-size: 20px;
    line-height: 1.55;
    color: var(--gray);
    margin-bottom: 18px;
  }
  .instrument-copy p strong { color: var(--white); font-weight: 500; }

  .spec-list {
    margin-top: 34px;
    display: grid;
    gap: 0;
  }
  .spec-list .row {
    display: flex;
    gap: 22px;
    align-items: baseline;
    padding: 16px 0;
    border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .spec-list .row:first-child { border-top: 1px dashed rgba(255, 255, 255, 0.08); }
  .spec-list .row .key {
    color: var(--teal);
    min-width: 120px;
    font-weight: 600;
  }
  .spec-list .row .val {
    color: var(--gray);
    flex: 1;
    letter-spacing: 0.06em;
    text-transform: none;
    font-size: 13px;
  }

  /* ---------- SECTION 3: OUTCOMES ---------- */
  .outcomes-stack {
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
  }
  .outcome {
    display: grid;
    grid-template-columns: 140px 1fr 240px;
    gap: 48px;
    padding: 32px 0;
    border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
    align-items: start;
  }
  .outcome:first-child { border-top: 1px dashed rgba(255, 255, 255, 0.08); }
  .outcome:last-child  { border-bottom: none; }

  .outcome .index {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.28em;
    color: var(--teal);
    padding-top: 10px;
    text-transform: uppercase;
  }

  .outcome .body h3 {
    font-family: 'General Sans', 'Poppins', sans-serif;
    font-weight: 800;
    font-size: clamp(32px, 3.8vw, 52px);
    line-height: 0.98;
    letter-spacing: -0.025em;
    color: var(--white);
  }
  .outcome .body h3 .dot { color: var(--teal); }

  .outcome .body p {
    font-family: 'Poppins', sans-serif;
    font-size: 16px;
    line-height: 1.55;
    color: var(--gray);
    margin-top: 14px;
    max-width: 520px;
  }

  .outcome .stats {
    display: grid;
    gap: 0;
    padding-top: 18px;
  }
  .outcome .stats .stat {
    display: grid;
    grid-template-columns: 88px 1fr;
    gap: 12px;
    align-items: baseline;
    padding: 9px 0;
    border-bottom: 1px dashed rgba(255, 255, 255, 0.06);
  }
  .outcome .stats .stat:first-child { border-top: 1px dashed rgba(255, 255, 255, 0.06); }

  .outcome .stats .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--teal);
  }
  .outcome .stats .desc {
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    line-height: 1.4;
    color: var(--gray);
  }

  /* ---------- SECTION 4: PROOF ---------- */
  .proof-grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    width: 100%;
  }
  .proof-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 4px;
    padding: 30px 28px;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .proof-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 28px;
    width: 36px;
    height: 2px;
    background: var(--teal);
  }
  .proof-card:hover {
    border-color: rgba(54, 231, 179, 0.35);
    transform: translateY(-2px);
  }
  .proof-card .mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.28em;
    color: var(--teal);
    text-transform: uppercase;
  }
  .proof-card blockquote {
    font-family: 'General Sans', 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 21px;
    line-height: 1.35;
    letter-spacing: -0.01em;
    color: var(--white);
    flex: 1;
  }
  .proof-card .attribution {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--gray-dim);
    text-transform: uppercase;
    padding-top: 16px;
    border-top: 1px dashed rgba(255, 255, 255, 0.08);
  }
  .proof-card .attribution .name { color: var(--gray); font-weight: 600; }

  /* ---------- SECTION 5: PRIVACY ---------- */
  .section-privacy {
    text-align: center;
    /* True-center the privacy-content by pulling the section-divider out
       of the flex flow (absolute at top). With only privacy-content left
       as a flex item, justify-content: center centers it perfectly. */
    justify-content: center;
  }
  .section-privacy .section-divider {
    position: absolute;
    top: 70px;
    left: 44px;
    right: 44px;
    margin: 0;
    max-width: none;
    width: auto;
  }
  .privacy-content {
    max-width: 820px;
    margin: 0 auto;
  }
  .privacy-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.32em;
    color: var(--teal);
    text-transform: uppercase;
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .privacy-eyebrow::before,
  .privacy-eyebrow::after {
    content: '';
    width: 38px;
    height: 1px;
    background: var(--teal);
    opacity: 0.6;
  }
  .privacy-content h2 {
    font-family: 'General Sans', 'Poppins', sans-serif;
    font-weight: 800;
    font-size: clamp(42px, 6vw, 76px);
    line-height: 0.98;
    letter-spacing: -0.025em;
    color: var(--white);
    margin-bottom: 34px;
  }
  .privacy-content h2 .accent { color: var(--teal); }

  .privacy-lead {
    font-family: 'Poppins', sans-serif;
    font-size: 19px;
    line-height: 1.6;
    color: var(--gray);
    max-width: 640px;
    margin: 0 auto 44px;
  }
  .privacy-tags {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 32px 44px;
  }
  .privacy-tags .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gray);
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .privacy-tags .tag .dot {
    color: var(--teal);
    font-size: 9px;
    line-height: 1;
  }

  /* ---------- SECTION 6: CLOSE ---------- */
  .section-close { text-align: center; }
  .close-content {
    max-width: 720px;
    margin: 0 auto;
  }
  .close-content h2 {
    font-family: 'General Sans', 'Poppins', sans-serif;
    font-weight: 800;
    font-size: clamp(44px, 6vw, 78px);
    line-height: 0.98;
    letter-spacing: -0.025em;
    color: var(--white);
    margin-bottom: 28px;
  }
  .close-content h2 .accent { color: var(--teal); }
  .close-content .lead {
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    line-height: 1.55;
    color: var(--gray);
    max-width: 520px;
    margin: 0 auto 44px;
  }
  .close-spec {
    max-width: 420px;
    margin: 0 auto 40px;
    padding: 24px 28px;
    border: 1px solid rgba(54, 231, 179, 0.22);
    border-radius: 4px;
    background: rgba(54, 231, 179, 0.03);
    text-align: left;
  }
  .close-spec .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 12px 0;
    border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .close-spec .row:last-child { border-bottom: none; }
  .close-spec .row .k { color: var(--teal); font-weight: 600; }
  .close-spec .row .v {
    color: var(--gray);
    letter-spacing: 0.06em;
    text-transform: none;
    font-size: 13px;
  }
  .close-spec .row .v.price {
    font-family: 'General Sans', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--white);
  }
  .close-cta-headline {
    font-family: 'General Sans', 'Poppins', sans-serif;
    font-weight: 700;
    font-size: clamp(22px, 2.2vw, 26px);
    letter-spacing: -0.01em;
    color: var(--white);
    margin-bottom: 22px;
    line-height: 1.2;
  }
  .close-cta-headline .accent { color: var(--teal); }

  .close-cta-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  /* platform-specific app badges */
  .app-badge {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 12px 22px;
    background: var(--white);
    color: var(--navy);
    border-radius: 10px;
    text-decoration: none;
    transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.2s ease;
    min-width: 220px;
  }
  .app-badge:hover {
    background: var(--teal);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(54, 231, 179, 0.22);
  }
  .app-badge-logo { flex-shrink: 0; }
  .app-badge-text {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1;
    gap: 3px;
  }
  .app-badge-text .small {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .app-badge-text .big {
    font-family: 'General Sans', 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.01em;
  }

  .btn-xl { font-size: 13px; padding: 20px 32px; }

  .trust-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gray-dim);
  }
  .trust-line span { color: var(--teal); margin: 0 8px; }

  .end-tag {
    max-width: 1200px;
    margin: 90px auto 0;
    padding: 18px 0 0;
    border-top: 1px dashed rgba(255, 255, 255, 0.08);
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.28em;
    color: var(--gray-dim);
    text-transform: uppercase;
  }
  .end-tag .end-live {
    color: var(--teal);
    animation: blink 1.6s steps(2, end) infinite;
  }

  /* ---------- FOOTER ---------- */
  .page-footer {
    padding: 72px 44px 28px;
    background: var(--navy-deep);
    border-top: 1px solid rgba(255,255,255,0.06);
    position: relative;
    /* Footer is its own gentle snap target so scrolling past the
       close section lands cleanly on the colophon instead of floating. */
    scroll-snap-align: start;
  }
  .page-footer::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 48px;
    height: 2px;
    background: var(--teal);
    box-shadow: 0 0 12px rgba(54, 231, 179, 0.6);
  }
  .footer-main {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1fr;
    gap: 56px;
    padding-bottom: 48px;
    border-bottom: 1px dashed rgba(255,255,255,0.08);
  }
  .footer-col h4 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gray-dim);
    margin-bottom: 18px;
  }
  .footer-col .wordmark {
    margin-bottom: 20px;
  }
  .footer-tagline {
    font-family: 'General Sans', 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 22px;
    line-height: 1.15;
    color: var(--white);
  }
  .footer-tagline span { color: var(--teal); }
  .footer-links {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 500;
  }
  .footer-links a {
    color: var(--gray);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-links a:hover { color: var(--teal); }
  .footer-links .soon {
    color: var(--gray-dim);
    font-size: 13px;
    display: none;
  }
  .footer-links .soon em {
    color: var(--teal);
    font-style: normal;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-left: 6px;
  }
  .footer-socials {
    display: flex;
    gap: 12px;
  }
  .footer-socials a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--gray);
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .footer-socials a:hover {
    color: var(--teal);
    border-color: var(--teal);
    background: rgba(54, 231, 179, 0.06);
  }
  .footer-bottom {
    max-width: 1200px;
    margin: 0 auto;
    padding-top: 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-dim);
  }
  .footer-bottom .left span { color: var(--teal); }

  /* ---------- SECTION 02: LOCATE ---------- */
  .locate-grid {
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    display: grid;
    grid-template-columns: minmax(320px, 460px) 1fr;
    gap: 72px;
    align-items: center;
  }
  .infographic-frame {
    position: relative;
    border: 1px solid rgba(54, 231, 179, 0.22);
    border-radius: 4px;
    background: var(--navy);
    padding: 14px;
    box-shadow:
      inset 0 2px 8px rgba(0,0,0,0.55),
      0 0 48px rgba(54, 231, 179, 0.12);
  }
  .infographic-frame::before {
    content: '';
    position: absolute;
    inset: 5px;
    border: 1px solid rgba(255,255,255,0.03);
    border-radius: 2px;
    pointer-events: none;
  }
  .infographic-frame img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 2px;
  }
  .infographic-placeholder {
    aspect-ratio: 946 / 1555;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--unlit);
    border-radius: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--gray-dim);
    text-align: center;
    padding: 20px;
  }
  .infographic-caption {
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.28em;
    color: var(--teal-dim);
    text-transform: uppercase;
    text-align: center;
  }
  .locate-copy .eyebrow { margin-bottom: 20px; }
  .locate-copy p {
    font-family: 'Poppins', sans-serif;
    font-size: 17px;
    font-weight: 400;
    line-height: 1.6;
    color: var(--gray);
    margin-bottom: 20px;
    max-width: 520px;
  }
  .locate-copy p strong { color: var(--white); font-weight: 600; }
  .tip-callout {
    margin-top: 32px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 18px 22px;
    background: rgba(54, 231, 179, 0.06);
    border: 1px solid rgba(54, 231, 179, 0.2);
    border-radius: 4px;
    max-width: 520px;
  }
  .tip-callout .tip-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: var(--teal);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .tip-callout .tip-body {
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    line-height: 1.55;
    color: var(--gray);
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 900px) {
    .hero {
      grid-template-columns: 1fr;
      gap: 36px;
      text-align: left;
    }
    .gauge-column { align-items: flex-start; }
    .hero-bar { height: 240px; width: 64px; }
    .rail-left, .rail-right { display: none; }

    .locate-grid { grid-template-columns: 1fr; gap: 40px; }
    .instrument-grid {
      grid-template-columns: 1fr;
      gap: 60px;
    }
    .section { padding: 70px 32px; }
    .phone-wrap { order: 2; }  /* copy first, phone below on mobile */
    .instrument-copy { order: 1; }

    .outcome {
      grid-template-columns: 1fr;
      gap:
